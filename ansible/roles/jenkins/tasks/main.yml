---
- name: Install OpenJDK 21 (required by current Jenkins)
  apt:
    name: openjdk-21-jre-headless
    state: present
    update_cache: true
  become: true

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Jenkins apt GPG key (ascii-armored)
  # Jenkins rotates this key periodically (was jenkins.io-2023.key, now
  # jenkins.io-2026.key per https://www.jenkins.io/doc/book/installing/linux/)
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /tmp/jenkins.asc
    mode: "0644"
    force: true
  become: true

- name: Dearmor Jenkins GPG key into binary keyring
  # Ubuntu 24.04's GnuPG (2.4.x) can fail to validate the raw ASCII-armored
  # key via apt's signed-by, producing NO_PUBKEY even though the file is
  # present. Dearmoring to a binary keyring avoids that.
  command: gpg --batch --yes --dearmor -o /etc/apt/keyrings/jenkins.gpg /tmp/jenkins.asc
  become: true

- name: Add Jenkins apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins.gpg] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins
    update_cache: true
  become: true

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
    update_cache: true
  become: true

- name: Ensure Jenkins service is enabled and running
  systemd:
    name: jenkins
    enabled: true
    state: started
  become: true

- name: Add jenkins user to docker group (so pipeline can build/run containers)
  user:
    name: jenkins
    groups: docker
    append: true
  become: true
  notify: restart jenkins

- name: Install Python build tools for pipeline stages (venv, pip)
  apt:
    name:
      - python3-venv
      - python3-pip
    state: present
  become: true

- name: Check if gitleaks is already installed
  stat:
    path: /usr/local/bin/gitleaks
  register: gitleaks_binary

- name: Download and install gitleaks
  unarchive:
    src: "https://github.com/gitleaks/gitleaks/releases/download/v{{ gitleaks_version }}/gitleaks_{{ gitleaks_version }}_linux_x64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    include: gitleaks
    mode: "0755"
  become: true
  when: not gitleaks_binary.stat.exists

- name: Install prerequisites for Trivy apt repo
  apt:
    name:
      - gnupg
      - lsb-release
    state: present
  become: true

- name: Download Trivy apt GPG key (ascii-armored)
  get_url:
    url: https://aquasecurity.github.io/trivy-repo/deb/public.key
    dest: /tmp/trivy.asc
    mode: "0644"
    force: true
  become: true

- name: Dearmor Trivy GPG key into binary keyring
  command: gpg --batch --yes --dearmor -o /etc/apt/keyrings/trivy.gpg /tmp/trivy.asc
  become: true

- name: Add Trivy apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb {{ ansible_distribution_release }} main"
    state: present
    filename: trivy
    update_cache: true
  become: true

- name: Install Trivy
  apt:
    name: trivy
    state: present
  become: true

- name: Create .ssh directory for jenkins user
  file:
    path: /var/lib/jenkins/.ssh
    state: directory
    owner: jenkins
    group: jenkins
    mode: "0700"
  become: true

- name: Pre-trust GitHub's host key for the jenkins user
  # Jenkins runs as its own system user, separate from ubuntu -- it has its
  # own known_hosts and needs github.com trusted before it can git clone
  # over SSH, otherwise pipeline checkouts fail with "Host key verification
  # failed." (jenkins is a nologin system user, so this is done as root
  # writing directly into its .ssh dir rather than via become_user.)
  known_hosts:
    name: github.com
    key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 github.com') }}"
    path: /var/lib/jenkins/.ssh/known_hosts
  become: true

- name: Ensure jenkins .ssh contents are owned by jenkins
  file:
    path: /var/lib/jenkins/.ssh
    owner: jenkins
    group: jenkins
    recurse: true
  become: true

- name: Wait for Jenkins initial admin password file (only present on a fresh install)
  # Once someone completes the setup wizard, Jenkins deletes this file --
  # a re-run against an already-configured instance should not fail here.
  wait_for:
    path: /var/lib/jenkins/secrets/initialAdminPassword
    timeout: 60
  become: true
  ignore_errors: true
  register: jenkins_initial_password_wait

- name: Read Jenkins initial admin password
  slurp:
    src: /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_admin_password_b64
  become: true
  when: jenkins_initial_password_wait is succeeded

- name: Fetch initial admin password to control node
  copy:
    content: "{{ jenkins_admin_password_b64.content | b64decode }}"
    dest: "{{ playbook_dir }}/../jenkins_initial_admin_password.txt"
  delegate_to: localhost
  become: false
  when: jenkins_initial_password_wait is succeeded
