# Loki + Promtail only -- Grafana and Prometheus already come from
# kube-prometheus-stack, no need to duplicate them here.
loki:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

grafana:
  enabled: false

prometheus:
  enabled: false
