# Loki + Promtail only -- Grafana and Prometheus already come from
# kube-prometheus-stack, no need to duplicate them here.
loki:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

grafana:
  enabled: false
  sidecar:
    datasources:
      # Even with grafana.enabled: false, this chart still creates its own
      # Grafana datasource ConfigMap (isDefault: true) by default, which
      # conflicts with kube-prometheus-stack's own default Prometheus
      # datasource ("Only one datasource per organization can be marked as
      # default") and crashes Grafana. We register Loki as a datasource
      # ourselves (roles/monitoring/files/loki-datasource.yml) instead.
      enabled: false

prometheus:
  enabled: false
