# Trimmed for a 2GB-RAM single-node k3s box shared with Jenkins + Docker.
alertmanager:
  enabled: false

grafana:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: false
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true
  # NodePort (fixed at 31123) so Grafana is reachable directly at
  # http://<ec2-public-ip>:31123 -- SG-restricted to the operator's IP via
  # terraform/security_group.tf, same pattern as the Jenkins UI port.
  # Making this part of the chart config (not a manual `kubectl patch`)
  # means it survives helm upgrade/uninstall-reinstall cycles.
  service:
    type: NodePort
    nodePort: 31123

prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec: {}

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# These targets don't apply cleanly to a k3s single-node install and just
# generate permanently-"down" noise.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false
kubeProxy:
  enabled: false
