---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install prerequisite packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
  become: true

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Add Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: true

- name: Install Docker Engine and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure Docker service is enabled and running
  systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: true
  become: true

- name: Check if docker network already exists
  command: docker network inspect {{ docker_network_name }}
  register: docker_network_check
  changed_when: false
  failed_when: false
  become: true

- name: Create docker network for OTS containers
  command: docker network create {{ docker_network_name }}
  when: docker_network_check.rc != 0
  become: true

- name: Check if docker volumes already exist
  command: docker volume inspect {{ item }}
  register: docker_volume_check
  loop: "{{ docker_volumes }}"
  changed_when: false
  failed_when: false
  become: true

- name: Create persistent docker volumes
  command: docker volume create {{ item.item }}
  loop: "{{ docker_volume_check.results }}"
  when: item.rc != 0
  become: true

- name: Remove volumes no longer needed (SQLite-only for now, no Postgres/Redis)
  command: docker volume rm {{ item }}
  loop: "{{ docker_volumes_removed }}"
  register: docker_volume_remove
  failed_when: docker_volume_remove.rc != 0 and 'No such volume' not in docker_volume_remove.stderr
  changed_when: docker_volume_remove.rc == 0
  become: true
