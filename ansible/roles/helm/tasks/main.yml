---
- name: Install prerequisite packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
  become: true

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Helm apt GPG key (ascii-armored)
  # Helm's apt repo migrated from baltocdn.com to packages.buildkite.com --
  # https://helm.sh/docs/intro/install/ has the current source of truth.
  get_url:
    url: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
    dest: /tmp/helm.asc
    mode: "0644"
    force: true
  become: true

- name: Dearmor Helm GPG key into binary keyring
  command: gpg --batch --yes --dearmor -o /etc/apt/keyrings/helm.gpg /tmp/helm.asc
  become: true

- name: Add Helm apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main"
    state: present
    filename: helm-stable-debian
    update_cache: true
  become: true

- name: Install Helm
  apt:
    name: helm
    state: present
  become: true
